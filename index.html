<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG ONLINE FINAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.screen{display:none;height:100vh;justify-content:center;align-items:center;}
#login{display:flex;}

.box{
background:#1e293b;
padding:30px;
border-radius:15px;
width:400px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.enemy{
font-size:50px;
animation:idle 1s infinite alternate;
}

@keyframes idle{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}
</style>
</head>

<body>

<div id="login" class="screen">
<div class="box">
<h2>LOGIN</h2>
<input id="user" placeholder="User"><br>
<input id="pass" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar</button>
<p id="msg"></p>
</div>
</div>

<div id="lobby" class="screen">
<div class="box">
<h2>LOBBY</h2>
<p>Gold: <span id="gold"></span></p>
<button onclick="start()">Jogar</button>
<button onclick="waveMode()">Modo Ondas</button>
</div>
</div>

<div id="game" class="screen">
<div class="box">

<div class="enemy" id="enemySprite">🧟</div>
<h2 id="enemyName"></h2>
<p>HP Inimigo: <span id="ehp"></span></p>

<hr>

<p>HP: <span id="hp"></span></p>
<p>Classe: <span id="class"></span></p>
<p>Wave: <span id="wave"></span></p>

<button onclick="attack()">Atacar</button>
<button onclick="special()">Especial</button>
<button onclick="heal()">Curar</button>

</div>
</div>

<script>
const API="http://localhost:3000";

/* PLAYER */
let player={
gold:50,
hp:100,
maxHP:100,
dmg:10,
classe:"Guerreiro"
};

let enemy={
hp:100,
name:"🧟 Zumbi",
dmg:10
};

let wave=1;
let cooldown=0;

/* UI */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
}

/* LOGIN */
function login(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:user.value,pass:pass.value})
})
.then(r=>r.json())
.then(d=>{
if(!d.ok){msg.innerText=d.msg;return;}
player=d.data;
show("lobby");
update();
});
}

function register(){
fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:user.value,pass:pass.value})
})
.then(r=>r.json())
.then(d=>{
msg.innerText=d.ok?"Criado!":d.msg;
});
}

/* GAME */
function start(){
spawnEnemy();
show("game");
update();
}

function waveMode(){
wave=1;
spawnEnemy();
show("game");
}

/* SPAWN */
function spawnEnemy(){
if(wave%5===0){
enemy={hp:200+wave*20,name:"👑 Boss",dmg:20};
}
else{
let types=["🧟 Zumbi","🧌 Orc","💀 Esqueleto"];
enemy={
hp:100+wave*20,
name:types[Math.floor(Math.random()*types.length)],
dmg:10+wave*2
};
}
}

/* COMBATE */
function attack(){
enemy.hp-=player.dmg;
player.gold+=10;

enemyTurn();
check();
}

function special(){
if(cooldown>0) return;

enemy.hp-=player.dmg*3;
cooldown=2;

enemyTurn();
check();
}

function heal(){
player.hp=Math.min(player.maxHP,player.hp+20);

enemyTurn();
check();
}

function enemyTurn(){
player.hp-=enemy.dmg;
}

/* CHECK */
function check(){
cooldown=Math.max(0,cooldown-1);

if(enemy.hp<=0){
wave++;
player.gold+=50;
spawnEnemy();
}

if(player.hp<=0){
alert("Morreu na wave "+wave);
location.reload();
}

update();
}

/* UPDATE */
function update(){
gold.innerText=player.gold;
hp.innerText=player.hp;
class.innerText=player.classe;
enemyName.innerText=enemy.name;
ehp.innerText=enemy.hp;
wave.innerText=wave;
}

/* INIT */
window.onload=()=>show("login");
</script>

</body>
</html>
