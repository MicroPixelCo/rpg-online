<script>

const API="https://vedolarpg.onrender.com";

/* =========================
   FIX CRÍTICO (BUG LOGIN)
========================= */
const user = document.getElementById("user");
const pass = document.getElementById("pass");
const msg = document.getElementById("msg");

/* =========================
   PLAYER / GAME
========================= */
let username="";
let player={};
let enemy={hp:300,name:"🧟 Zumbi"};

let cooldown=0;
let stun=0;
let wave=1;

/* =========================
   PERSONAGENS
========================= */
const CHAR={
mage:{hp:100,dmg:10,regen:10,s:45,cool:2},
knight:{hp:175,dmg:25,regen:10,s:50,cool:2},
barbarian:{hp:210,dmg:55,regen:18,s:80,cool:3},
golem:{hp:500,dmg:50,regen:5,s:200,cool:4,stun:2},
dark:{hp:350,dmg:60,regen:10,s:150,cool:3}
};

/* =========================
   UI
========================= */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
}

/* =========================
   LOGIN
========================= */
function login(){
msg.innerText="Conectando...";

fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:user.value,
pass:pass.value
})
})
.then(r=>r.json())
.then(d=>{
if(!d.ok){
msg.innerText=d.msg;
return;
}

username=user.value;
player=d.data;

show("lobby");
update();
})
.catch(()=>{
msg.innerText="Servidor demorando...";
});
}

/* =========================
   REGISTER
========================= */
function register(){
msg.innerText="Criando conta...";

fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:user.value,
pass:pass.value
})
})
.then(r=>r.json())
.then(d=>{
msg.innerText=d.ok?"Criado com sucesso!":"Erro: "+d.msg;
})
.catch(()=>{
msg.innerText="Erro no servidor";
});
}

/* =========================
   LOBBY
========================= */
function start(){show("game");}
function openShop(){show("shop");}
function back(){show("lobby");}
function logout(){location.reload();}

/* =========================
   COMBATE
========================= */
function attack(){
enemy.hp-=player.dmg;
player.gold+=10;
enemyTurn();
end();
}

function special(){
let c=CHAR[player.classe];
if(!c || cooldown>0) return;

enemy.hp-=c.s;
cooldown=c.cool;

if(c.stun) stun=c.stun;

enemyTurn();
end();
}

function heal(){
player.hp=Math.min(player.maxHP,player.hp+player.regen);
enemyTurn();
end();
}

function enemyTurn(){
player.hp-=15;
}

/* =========================
   WAVES + BOSSES
========================= */
function end(){

cooldown=Math.max(0,cooldown-1);

if(enemy.hp<=0){
wave++;
player.gold+=50;

enemy.hp=300+wave*25;
enemy.name = wave%5===0 ? "👑 BOSS" : "🧟 Zumbi";
}

if(player.hp<=0){
alert("Você perdeu na wave "+wave);
location.reload();
}

update();
}

/* =========================
   LOJA
========================= */
function buy(id){
let c=CHAR[id];
if(!c) return;

let price={
mage:0,
knight:150,
barbarian:400,
golem:800,
dark:1000
};

if(player.gold<price[id]) return;

player.gold-=price[id];
player.classe=id;

player.maxHP=c.hp;
player.hp=c.hp;
player.dmg=c.dmg;
player.regen=c.regen;

update();
}

/* =========================
   UPDATE
========================= */
function update(){
gold.innerText=player.gold;
gold2.innerText=player.gold;
hp.innerText=player.hp;
class.innerText=player.classe;
enemyName.innerText=enemy.name;
ehp.innerText=enemy.hp;
}

</script>
