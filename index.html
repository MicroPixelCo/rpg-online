<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG ONLINE 2.0</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.screen{
    width:100vw;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:400px;
    text-align:center;
}

button{margin:5px;padding:10px;cursor:pointer}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen" style="display:flex">
<div class="box">
<h2>LOGIN</h2>
<input id="user"><br>
<input id="pass" type="password"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar</button>
<p id="msg"></p>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="box">

<h2 id="classe"></h2>
<p id="stats"></p>

<h3>👾 Inimigo</h3>
<p id="enemy"></p>

<button onclick="attack()">⚔️ Atacar</button>
<button onclick="heal()">💊 Curar</button>
<button onclick="shop()">🛒 Loja</button>

</div>
</div>

<script>

const user = document.getElementById("user");
const pass = document.getElementById("pass");
const msg = document.getElementById("msg");

let username = "";

let player = {};
let enemy = { hp: 50 };

function register(){
fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:user.value,pass:pass.value})
}).then(r=>r.json()).then(d=>{
msg.innerText = d.ok ? "Criado!" : d.msg;
});
}

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:user.value,pass:pass.value})
}).then(r=>r.json()).then(d=>{
if(!d.ok) return msg.innerText = d.msg;

username = user.value;
player = d.data;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";

update();
});
}

/* GAME LOOP */
function update(){
document.getElementById("classe").innerText =
player.classe || "Sem classe";

document.getElementById("stats").innerText =
`❤️ ${player.hp} | 💰 ${player.gold} | ⭐ LVL ${player.level} (${player.xp} XP)`;

document.getElementById("enemy").innerText =
`HP: ${enemy.hp}`;
}

/* BATALHA PvE */
function attack(){
enemy.hp -= 10;

player.gold += 5;
player.xp += 10;

if(enemy.hp <= 0){
enemy.hp = 50;
player.gold += 20;
player.xp += 50;
}

levelUp();
save();
update();
}

function heal(){
player.hp = Math.min(player.maxHP, player.hp + 20);
save();
update();
}

function levelUp(){
if(player.xp >= 100){
player.level++;
player.xp = 0;
player.maxHP += 20;
player.hp = player.maxHP;
}
}

function shop(){
if(player.gold >= 20){
player.gold -= 20;
alert("Comprou espada!");
}
save();
update();
}

function save(){
fetch("/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:username,data:player})
});
}

</script>

</body>
</html>
