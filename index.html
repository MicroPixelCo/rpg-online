<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG ONLINE 5.5</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Pixelify Sans';
background:radial-gradient(circle,#1a1a2e,#0f0f1a);
color:white;
overflow:hidden;
}

.screen{
width:100vw;
height:100vh;
display:none;
justify-content:center;
align-items:center;
}

#login{display:flex;}

.box{
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:15px;
text-align:center;
width:420px;
}

input{
padding:10px;
margin:5px;
width:80%;
text-align:center;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:linear-gradient(45deg,#ff9f43,#ff4d6d,#6c5ce7);
color:white;
border:none;
border-radius:10px;
}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

.menu{display:flex;flex-direction:column;gap:10px;}

.card{
background:rgba(255,255,255,0.1);
padding:10px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
<div class="box">
<h2>LOGIN</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar</button>
<p id="msg"></p>
</div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
<div class="box">
<h1>🎮 LOBBY</h1>
<p>💰 Gold: <span id="gold"></span></p>

<div class="menu">
<button onclick="start()">Jogar</button>
<button onclick="openShop()">Loja</button>
<button onclick="logout()">Sair</button>
</div>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div id="hud">
HP: <span id="hp"></span><br>
Gold: <span id="gold2"></span><br>
Classe: <span id="class"></span>
</div>

<div class="box">
<h3>👾 Inimigo HP: <span id="ehp"></span></h3>

<button onclick="attack()">Atacar</button>
<button onclick="special()">Especial</button>
<button onclick="heal()">Curar</button>
<button onclick="back()">Lobby</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="box">
<h2>🛒 LOJA</h2>

<div class="card">
Mago FREE<br>
❤️100 ⚔️10 🔄10 ✨45<br>
<button onclick="buy('mage')">Escolher</button>
</div>

<div class="card">
Cavaleiro - 150<br>
❤️175 ⚔️25 🔄10 ✨50<br>
<button onclick="buy('knight')">Comprar</button>
</div>

<div class="card">
Bárbaro - 400<br>
❤️210 ⚔️55 🔄18 ✨80<br>
<button onclick="buy('barbarian')">Comprar</button>
</div>

<div class="card">
Golem - 800<br>
❤️500 ⚔️50 🔄5 ✨200 (stun)<br>
<button onclick="buy('golem')">Comprar</button>
</div>

<div class="card">
Dark Knight - 1000<br>
❤️350 ⚔️60 🔄10 ✨150<br>
<button onclick="buy('dark')">Comprar</button>
</div>

<button onclick="back()">Voltar</button>
</div>
</div>

<script>

const API="https://vedolarpg.onrender.com";

let username="";
let player={};
let enemy={hp:300};

let cooldown=0;
let stun=0;

/* ======================
   PERSONAGENS DO TEXTÃO
====================== */
const CHAR={
mage:{hp:100,dmg:10,regen:10,s:45,cool:2},
knight:{hp:175,dmg:25,regen:10,s:50,cool:2},
barbarian:{hp:210,dmg:55,regen:18,s:80,cool:3},
golem:{hp:500,dmg:50,regen:5,s:200,cool:4,stun:2},
dark:{hp:350,dmg:60,regen:10,s:150,cool:3}
};

/* ======================
   UI
====================== */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
}

/* ======================
   LOGIN
====================== */
function register(){
fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:user.value,pass:pass.value})
})
.then(r=>r.json())
.then(d=>msg.innerText=d.ok?"Criado!":d.msg);
}

function login(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:user.value,pass:pass.value})
})
.then(r=>r.json())
.then(d=>{
if(!d.ok)return msg.innerText=d.msg;

username=user.value;
player=d.data;

show("lobby");
update();
});
}

/* ======================
   LOBBY
====================== */
function start(){show("game");}
function openShop(){show("shop");}
function back(){show("lobby");}
function logout(){location.reload();}

/* ======================
   GAME TURNOS
====================== */
function attack(){
if(stun>0){stun--;end();return;}

enemy.hp-=player.dmg;
player.gold+=10;
end();
}

function special(){
let c=CHAR[player.classe];
if(!c) return;

if(cooldown>0) return;

enemy.hp-=c.s;
cooldown=c.cool;

if(c.stun) stun=c.stun;

end();
}

function heal(){
player.hp=Math.min(player.maxHP,player.hp+player.regen);
end();
}

function end(){

cooldown=Math.max(0,cooldown-1);

if(enemy.hp<=0){
enemy.hp=300;
player.gold+=50;
}

if(player.hp<=0){
alert("Você perdeu!");
location.reload();
}

update();
}

/* ======================
   LOJA
====================== */
function buy(id){
let c=CHAR[id];

let price={
mage:0,
knight:150,
barbarian:400,
golem:800,
dark:1000
};

if(player.gold<price[id])return;

player.gold-=price[id];
player.classe=id;

player.maxHP=c.hp;
player.hp=c.hp;
player.dmg=c.dmg;
player.regen=c.regen;

update();
}

/* ======================
   UPDATE
====================== */
function update(){
gold.innerText=player.gold;
gold2.innerText=player.gold;
hp.innerText=player.hp;
class.innerText=player.classe;
ehp.innerText=enemy.hp;
}

</script>

</body>
</html>
