<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG ONLINE 6.2</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Pixelify Sans';
background:radial-gradient(circle,#1a1a2e,#0f0f1a);
color:white;
overflow:hidden;
}

.screen{
width:100vw;
height:100vh;
display:none;
justify-content:center;
align-items:center;
}

#login{display:flex;}

.box{
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:15px;
text-align:center;
width:420px;
}

input{
padding:10px;
margin:5px;
width:80%;
text-align:center;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:linear-gradient(135deg,#3a0ca3,#7209b7,#f72585);
color:white;
border:none;
border-radius:10px;
}

.menu{display:flex;flex-direction:column;gap:10px;}

.card{
background:rgba(255,255,255,0.1);
padding:10px;
margin:10px;
border-radius:10px;
}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
<div class="box">
<h2>LOGIN</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar</button>
<p id="msg"></p>
</div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
<div class="box">
<h1>🎮 LOBBY</h1>
<p>💰 Gold: <span id="gold"></span></p>

<div class="menu">
<button onclick="start()">Jogar</button>
<button onclick="openShop()">Loja</button>
<button onclick="logout()">Sair</button>
</div>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div id="hud">
HP: <span id="hp"></span><br>
Gold: <span id="gold2"></span><br>
Classe: <span id="class"></span>
</div>

<div class="box">
<h2 id="enemyName"></h2>
<h3>HP: <span id="ehp"></span></h3>

<button onclick="attack()">Atacar</button>
<button onclick="special()">Especial</button>
<button onclick="heal()">Curar</button>
<button onclick="back()">Lobby</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="box">
<h2>🛒 LOJA</h2>

<div class="card">Mago FREE<br>100 HP | 10 Dano | 10 Regen</div>
<div class="card">Cavaleiro - 150</div>
<div class="card">Bárbaro - 400</div>
<div class="card">Golem - 800</div>
<div class="card">Dark Knight - 1000</div>

<button onclick="back()">Voltar</button>
</div>
</div>

<script>

const API="https://vedolarpg.onrender.com";

/* =========================
   ESTADO
========================= */
let username="";
let player={gold:0,hp:100,maxHP:100,regen:10,dmg:10,classe:""};
let enemy={hp:300,name:"🧟 Zumbi"};

let cooldown=0;
let wave=1;

/* =========================
   PERSONAGENS
========================= */
const CHAR={
mage:{hp:100,dmg:10,regen:10,s:45,cool:2},
knight:{hp:175,dmg:25,regen:10,s:50,cool:2},
barbarian:{hp:210,dmg:55,regen:18,s:80,cool:3},
golem:{hp:500,dmg:50,regen:5,s:200,cool:4,stun:2},
dark:{hp:350,dmg:60,regen:10,s:150,cool:3}
};

/* =========================
   SAFE GET
========================= */
function get(id){
return document.getElementById(id);
}

/* =========================
   UPDATE
========================= */
function update(){
if(get("gold")) get("gold").innerText = player.gold || 0;
if(get("gold2")) get("gold2").innerText = player.gold || 0;
if(get("hp")) get("hp").innerText = player.hp || 0;
if(get("class")) get("class").innerText = player.classe || "Nenhuma";
if(get("enemyName")) get("enemyName").innerText = enemy.name;
if(get("ehp")) get("ehp").innerText = enemy.hp;
}

/* =========================
   SHOW
========================= */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
let el=get(id);
if(el) el.style.display="flex";
}

/* =========================
   LOGIN
========================= */
function login(){
const u=get("user"), p=get("pass"), m=get("msg");

if(m) m.innerText="Conectando...";

fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:u.value,pass:p.value})
})
.then(r=>r.json())
.then(d=>{
if(!d.ok){ if(m) m.innerText=d.msg; return; }

username=u.value;
player=d.data;

show("lobby");
update();
})
.catch(()=>{ if(m) m.innerText="Erro de conexão"; });
}

/* =========================
   REGISTER
========================= */
function register(){
const u=get("user"), p=get("pass"), m=get("msg");

if(m) m.innerText="Criando...";

fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:u.value,pass:p.value})
})
.then(r=>r.json())
.then(d=>{
if(m) m.innerText=d.ok?"Criado!":d.msg;
})
.catch(()=>{ if(m) m.innerText="Erro"; });
}

/* =========================
   GAME FLOW
========================= */
function start(){show("game");}
function openShop(){show("shop");}
function back(){show("lobby");}
function logout(){location.reload();}

/* =========================
   COMBATE
========================= */
function attack(){
enemy.hp-=player.dmg;
player.gold+=10;
enemyTurn();
end();
}

function special(){
let c=CHAR[player.classe];
if(!c || cooldown>0) return;

enemy.hp-=c.s;
cooldown=c.cool;

enemyTurn();
end();
}

function heal(){
player.hp=Math.min(player.maxHP,player.hp+player.regen);
enemyTurn();
end();

function enemyTurn(){
player.hp-=15;
}

/* =========================
   WAVES
========================= */
function end(){
cooldown=Math.max(0,cooldown-1);

if(enemy.hp<=0){
wave++;
player.gold+=50;
enemy.hp=300+wave*25;
enemy.name = wave%5===0 ? "👑 BOSS" : "🧟 Zumbi";
}

if(player.hp<=0){
alert("Você perdeu na wave "+wave);
location.reload();
}

update();
}

/* =========================
   LOJA
========================= */
function buy(id){
let c=CHAR[id];
if(!c) return;

let price={
mage:0,knight:150,barbarian:400,golem:800,dark:1000
};

if(player.gold<price[id]) return;

player.gold-=price[id];
player.classe=id;

player.maxHP=c.hp;
player.hp=c.hp;
player.dmg=c.dmg;
player.regen=c.regen;

update();
}

/* =========================
   INIT SAFE
========================= */
window.addEventListener("load",()=>{
show("login");
update();
});

</script>

</body>
</html>
